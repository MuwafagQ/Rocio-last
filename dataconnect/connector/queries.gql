query GetUser($id: String!) @auth(level: USER) {
  user(id: $id) {
    id
    isCorporate
    tier {
      id
      name
    }
    nameAr
    phone
  }
}

query ListBrands @auth(level: PUBLIC) {
  brands {
    id
    name
    logoUrl
    isActive
  }
}

query GetUserOrdersPaginated($userId: String!, $limit: Int!, $offset: Int!) @auth(level: USER) {
  orders(where: { user: { id: { eq: $userId } } }, orderBy: [{ createdAt: DESC }], limit: $limit, offset: $offset) {
    id
    status
    totalAmount
    deliveryAddress
    createdAt
    odooOrderId
    orderItems_on_order {
      quantity
      priceAtPurchase
      sku {
        size
        uom
        product {
          nameAr
          imageUrl
        }
      }
    }
  }
}

query ListProducts @auth(level: PUBLIC) {
  products {
    id
    nameAr
    nameEn
    descriptionAr
    imageUrl
    phLevel
    sodiumLevel
    isFeatured
    isSubscription
    isMosqueDonation
    isLowSodium
    isActive
    brand {
      id
      name
      logoUrl
    }
    skus_on_product {
      id
      size
      uom
      internalReference
      stock
      isActive
      tierPrices_on_sku {
        price
        tier {
          name
        }
      }
    }
  }
}
